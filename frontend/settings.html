<!DOCTYPE html>
<html>

<head>
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="mascot-container">
    <div class="mascot">
        <div class="face">
            <div class="eye left-eye"></div>
            <div class="eye right-eye"></div>
        </div>
    </div>
</div>

    <div class="sidebar">
        <h2>Smart Tracker</h2>

        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="alerts.html">Alerts</a></li>
            <li><a href="settings.html" class="active">Settings</a></li>
        </ul>
    </div>

    <div class="main settings-layout">

        <!-- LEFT SIDE -->
        <div class="settings-left">

            <h1>Settings ⚙️</h1>

            <div class="setting-card">
                <h3>🔔 Alert Distance</h3>
                <input id="distance" placeholder="Enter meters (e.g 100)">
            </div>

            <div class="setting-card">
                <h3>📡 Tracking Mode</h3>
                <select id="mode">
                    <option>Live Tracking</option>
                    <option>Battery Saving</option>
                </select>
            </div>

            <div class="setting-card">
                <h3>🗺️ Map Type</h3>
                <select id="mapType">
                    <option>Roadmap</option>
                    <option>Satellite</option>
                </select>
            </div>

            <div class="setting-card">
                <h3>🗑️ Manage Devices</h3>
                <div id="deviceList"></div>
            </div>

            <button class="save-btn" onclick="saveSettings()">Save Settings</button>

            <button class="logout-btn" onclick="logout()">Logout</button>

        </div>

        <!-- RIGHT SIDE PROFILE -->
        <div class="profile-panel">

            <div class="profile-card">

                <div class="avatar">👤</div>

                <h2 id="profileName"></h2>
                <p id="profileEmail"></p>

            </div>

        </div>

    </div>

    <!-- ⭐ VIP GOLD CONTACT FOOTER ⭐ -->
    <footer class="footer">
        <div class="footer-content">
            <span class="footer-title">Contact Me</span>

            <a href="mailto:monikab444455555@gmail.com" class="footer-icon">📧</a>
            <a href="tel:+917604886081" class="footer-icon">📞</a>
            <a href="https://www.linkedin.com/in/monika-b-1b7789296" target="_blank" class="footer-icon">🔗</a>

            <p class="footer-thanks">Thank you for your visit 💛</p>
        </div>
    </footer>

    <script src="settings.js"></script>

</body>

</html>
